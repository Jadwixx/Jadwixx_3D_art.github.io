<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulina Leśniewska - 3D Artist Portfolio</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #111111 0%, #1e1e1e 100%);
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
            animation: fadeIn 1s ease-out;
            position: relative;
        }

        /* Stylizacja przycisku do zmiany języka */
        .lang-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }

        .lang-btn:hover {
            background-color: #555;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            margin-top: 30px;
        }

        .subtitle {
            color: #aaaaaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Nowa sekcja O mnie */
        .about-section {
            max-width: 800px;
            margin: 0 auto 50px auto;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 30px 40px;
            border-radius: 10px;
            text-align: center;
            line-height: 1.6;
            color: #cccccc;
        }

        .about-section h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 1.5rem;
        }

        .main-model {
            width: 100%;
            max-width: 900px;
            height: 600px;
            margin: 0 auto;
            background-color: transparent;
            outline: none;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .gallery-model {
            width: 100%;
            max-width: 400px;
            height: 400px;
            background-color: transparent;
            outline: none;
            transition: transform 0.4s ease-out; 
        }

        .gallery-model:hover {
            transform: scale(1.15);
            z-index: 10;
        }

        .instruction {
            color: #777777;
            font-size: 0.9rem;
            margin-top: 10px;
        }
