<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Artist Portfolio</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }
        model-viewer {
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto;
            background-color: #2a2a2a;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>Hi, I'm [Your Name]</h1>
    <p>3D Character/Environment Artist based in Poland.</p>

    <model-viewer 
        src="your_model.glb" 
        alt="A 3D model of my artwork" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1">
    </model-viewer>

    <p>Feel free to drag, zoom, and rotate the model above!</p>

</body>
</html>
